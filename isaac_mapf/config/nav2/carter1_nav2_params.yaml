/**:
  bt_navigator:
    ros__parameters:
      use_sim_time: true
      global_frame: World
      robot_base_frame: carter1/chassis_link/base_link
      odom_topic: /carter1/odom
      transform_tolerance: 0.2
      

  controller_server:
    ros__parameters:
      use_sim_time: true
      controller_frequency: 10.0
      min_x_velocity_threshold: 0.1
      min_y_velocity_threshold: 0.1
      min_theta_velocity_threshold: 0.1
      progress_checker_plugin: "progress_checker"
      goal_checker_plugins: ["goal_checker"]
      controller_plugins: ["FollowPath"]

      progress_checker:
        plugin: "nav2_controller::SimpleProgressChecker"
        required_movement_radius: 0.2
        movement_time_allowance: 10.0

      goal_checker:
        plugin: "nav2_controller::SimpleGoalChecker"
        xy_goal_tolerance: 0.1
        yaw_goal_tolerance: 0.1
        stateful: true

      FollowPath:
        plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
        desired_linear_vel: 0.8
        lookahead_dist: 0.6
        # min_lookahead_dist: 0.3
        # max_lookahead_dist: 0.9
        transform_tolerance: 0.2
        use_velocity_scaled_lookahead_dist: false
        use_regulated_linear_velocity_scaling: true
        use_cost_regulated_linear_velocity_scaling: false
        use_fixed_curvature_lookahead: false
        use_collision_detection: true
        rotate_to_heading_angular_vel: 1.5

  planner_server:
    ros__parameters:
      use_sim_time: true
      expected_planner_frequency: 1.0
      planner_plugins: ["GridBased"]

      GridBased:
        plugin: "nav2_navfn_planner/NavfnPlanner"
        tolerance: 0.5
        use_astar: false
        allow_unknown: true

  behavior_server:
    ros__parameters:
      use_sim_time: true
      global_frame: World
      robot_base_frame: carter1/chassis_link/base_link
      local_frame: World
      transform_tolerance: 0.2

  global_costmap:
    global_costmap:
      ros__parameters:
        use_sim_time: true
        global_frame: World
        robot_base_frame: carter1/chassis_link/base_link
        update_frequency: 2.0
        publish_frequency: 1.0
        transform_tolerance: 0.5
        always_send_full_costmap: true
        track_unknown_space: true
        robot_radius: 0.5
        plugins: ["static_layer", "inflation_layer"]

        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: true

        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          inflation_radius: 0.55
          cost_scaling_factor: 3.0

  local_costmap:
    local_costmap:
      ros__parameters:
        use_sim_time: true
        global_frame: carter1/odom
        robot_base_frame: carter1/chassis_link/base_link
        update_frequency: 5.0
        publish_frequency: 2.0
        transform_tolerance: 0.5
        always_send_full_costmap: true
        rolling_window: true
        width: 6
        height: 6
        resolution: 0.05
        robot_radius: 0.35
        plugins: ["obstacle_layer", "inflation_layer"]
        obstacle_layer:
          plugin: "nav2_costmap_2d::ObstacleLayer"
          enabled: true
          observation_sources: scan
          footprint_clearing_enabled: true
          obstacle_max_range: 4.0
          obstacle_min_range: 0.0
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          
          scan:
            topic: /carter1/front_2d_lidar/scan
            data_type: "LaserScan"
            clearing: true
            marking: true
            inf_is_valid: true
            obstacle_max_range: 4.0
            obstacle_min_range: 0.0
            raytrace_max_range: 5.0
            raytrace_min_range: 0.0

        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          inflation_radius: 0.5
          cost_scaling_factor: 2.0


