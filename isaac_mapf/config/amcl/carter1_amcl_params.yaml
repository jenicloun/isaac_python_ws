carter1:
  amcl:
    ros__parameters:
      use_sim_time: true

      global_frame_id: World
      odom_frame_id: carter1/odom
      base_frame_id: carter1/chassis_link/base_link
      scan_topic: /carter1/front_2d_lidar/scan

      tf_broadcast: true
      transform_tolerance: 0.5

      min_particles: 500
      max_particles: 2000
      alpha1: 0.2
      alpha2: 0.2
      alpha3: 0.2
      alpha4: 0.2
      alpha5: 0.2

      z_hit: 0.5
      z_short: 0.05
      z_max: 0.05
      z_rand: 0.5
      sigma_hit: 0.2
      lambda_short: 0.1

      laser_model_type: "likelihood_field"
      max_beams: 60
      laser_likelihood_max_dist: 2.0

      update_min_d: 0.2
      update_min_a: 0.2
      resample_interval: 1
      recovery_alpha_slow: 0.0
      recovery_alpha_fast: 0.0

      robot_model_type: "nav2_amcl::DifferentialMotionModel"

      set_initial_pose: false
      always_reset_initial_pose: false

      first_map_only: false
      save_pose_rate: 0.5