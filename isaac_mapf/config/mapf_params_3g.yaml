mapf:
  map_server:
    ros__parameters:
      use_sim_time: true

  mapf_base_node:
    ros__parameters:
      use_sim_time: true
      agent_num: 3
      global_frame_id: map
      planner_time_tolerance: 5.0
      goal_tolerance: 1.0
      mapf_planner: "mapf_planner/CBSROS"

      base_frame_id:
        agent_0: carter1/chassis_link/base_link 
        agent_1: carter2/chassis_link/base_link
        agent_2: carter3/chassis_link/base_link
      plan_topic:
        agent_0: carter1/plan
        agent_1: carter2/plan
        agent_2: carter3/plan

  goal_transformer:
    ros__parameters:
      use_sim_time: true
      agent_num: 3
      goal_topic:
        agent_0: carter1/goal
        agent_1: carter2/goal
        agent_2: carter3/goal